<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヴィラ・レディオ鷹の台</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0A0A0A;
    --text: #E8E0D0;
    --accent: #C8A850;
    --dim: #4A4A4A;
    --font: 'Courier New', Courier, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.8;
    padding: 48px 24px;
    max-width: 640px;
    padding-top: 0;
    margin: 0 auto;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--dim);
    padding-bottom: 32px;
    margin-bottom: 48px;
  }

  .tagline {
    font-size: 16px;
    color: var(--text);
    line-height: 2;
    margin-top: 24px;
    margin-bottom: 4px;
  }


  .hero {
    width: calc(100% + 48px);
    margin: -48px -24px 40px;
    overflow: hidden;
    max-height: 420px;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 60%;
    display: block;
  }

  .station-name {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 28px;
    font-weight: normal;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1.4;
  }

  .freq-block {
    margin: 40px 0;
    padding: 24px 0;
    border-top: 1px solid var(--dim);
    border-bottom: 1px solid var(--dim);
  }

  .freq-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .freq-number {
    font-size: 48px;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .freq-unit {
    font-size: 14px;
    color: var(--dim);
    margin-left: 4px;
  }

  .blink {
    animation: blink 2.4s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  .info-block {
    margin: 40px 0;
  }

  .info-row {
    display: flex;
    gap: 24px;
    padding: 8px 0;
    border-bottom: 1px solid #1A1A1A;
  }

  .info-key {
    color: var(--dim);
    min-width: 120px;
    flex-shrink: 0;
  }

  .info-val {
    color: var(--text);
  }

  .log-section {
    margin-top: 56px;
  }

  .log-header {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .log-entry {
    margin-bottom: 40px;
    padding-bottom: 40px;
    border-bottom: 1px solid #1A1A1A;
  }

  .log-date {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .log-body {
    color: var(--text);
    line-height: 2;
  }

  .log-tracks {
    margin-top: 16px;
    padding-left: 16px;
    border-left: 1px solid var(--dim);
  }

  .log-track {
    color: var(--dim);
    font-size: 13px;
    padding: 2px 0;
  }

  .log-track span {
    color: var(--text);
  }

  .message-block {
    margin-top: 56px;
    padding: 24px 0;
    border-top: 1px solid var(--dim);
  }

  .message-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .message-text {
    color: var(--dim);
    font-size: 13px;
    line-height: 2;
  }

  .message-link {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
  }

  .message-link:hover {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--dim);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--dim);
    margin-top: 16px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dim);
  }

  .status-dot.on-air {
    background: #C84848;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blink, .status-dot.on-air { animation: none; }
  }
</style>
</head>
